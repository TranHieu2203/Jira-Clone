services:
  postgres:
    image: postgres:16-alpine
    container_name: jira-clone-postgres
    environment:
      POSTGRES_DB: jira_clone
      POSTGRES_USER: jira_clone
      POSTGRES_PASSWORD: jira_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira_clone"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: jira-clone-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      E2E__NotifyUserEmail: ${E2E_NOTIFY_EMAIL:-}
      Database__Provider: Postgres
      Database__ConnectionString: Host=postgres;Port=5432;Database=jira_clone;Username=jira_clone;Password=jira_clone
      Database__AutoMigrate: "true"
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-CHANGE_ME_DEV_ONLY_THIS_KEY_MUST_BE_AT_LEAST_32_CHARS_LONG}
      Cors__Origins__0: http://localhost:4200
      Cors__Origins__1: http://localhost
      Cors__Origins__2: http://localhost:3000
      Cors__Origins__3: http://localhost:8080
      OnlyOffice__DocumentServerUrl: http://localhost:8080/
      OnlyOffice__ApiBaseUrl: http://api:8080
      OnlyOffice__JwtEnabled: "false"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: jira-clone-onlyoffice
    environment:
      # POC: tắt JWT để đơn giản. Production phải bật + share secret với BE callback verify.
      JWT_ENABLED: "false"
      # Cho phép DocServer fetch DOCX từ BE qua docker network DNS "api:8080".
      USE_UNAUTHORIZED_STORAGE: "true"
    ports:
      - "8080:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: jira-clone-web
    ports:
      - "4200:80"
    depends_on:
      - api

  # Optional: S3-compatible storage (create bucket `jira-clone` in console http://localhost:9001).
  minio:
    image: minio/minio:latest
    container_name: jira-clone-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
  onlyoffice_data:
  onlyoffice_log:
  onlyoffice_cache:
