services:
  postgres:
    image: postgres:16-alpine
    container_name: jira-clone-postgres
    environment:
      POSTGRES_DB: jira_clone
      POSTGRES_USER: jira_clone
      POSTGRES_PASSWORD: jira_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira_clone"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: jira-clone-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      E2E__NotifyUserEmail: ${E2E_NOTIFY_EMAIL:-}
      Database__Provider: Postgres
      Database__ConnectionString: Host=postgres;Port=5432;Database=jira_clone;Username=jira_clone;Password=jira_clone
      Database__AutoMigrate: "true"
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-CHANGE_ME_DEV_ONLY_THIS_KEY_MUST_BE_AT_LEAST_32_CHARS_LONG}
      Cors__Origins__0: http://localhost:4200
      Cors__Origins__1: http://localhost
      Cors__Origins__2: http://localhost:3000
      Cors__Origins__3: http://localhost:8080
      OnlyOffice__DocumentServerUrl: http://localhost:8080/
      OnlyOffice__ApiBaseUrl: http://api:8080
      OnlyOffice__JwtEnabled: "false"
      # S3-compatible storage. Docker DNS `localstack` resolve sang container, không phải host.
      Storage__Provider: S3
      Storage__S3__ServiceUrl: http://localstack:4566
      Storage__S3__Bucket: jira-clone
      Storage__S3__AccessKey: test
      Storage__S3__SecretKey: test
      Storage__S3__Region: us-east-1
      Storage__S3__ForcePathStyle: "true"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: jira-clone-onlyoffice
    environment:
      # POC: tắt JWT để đơn giản. Production phải bật + share secret với BE callback verify.
      JWT_ENABLED: "false"
      # Cho phép DocServer fetch DOCX từ BE qua docker network DNS "api:8080".
      USE_UNAUTHORIZED_STORAGE: "true"
    ports:
      - "8080:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: jira-clone-web
    ports:
      - "4200:80"
    depends_on:
      - api

  # Optional: S3-compatible storage (create bucket `jira-clone` in console http://localhost:9001).
  minio:
    image: minio/minio:latest
    container_name: jira-clone-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # S3 management UI cho LocalStack. Mở http://localhost:8081 để browse bucket
  # `jira-clone`: list / upload / download / delete object. Connect tới LocalStack qua
  # docker DNS `localstack:4566` (path-style addressing để hợp với ForcePathStyle).
  s3manager:
    image: cloudlena/s3manager:latest
    container_name: jira-clone-s3manager
    environment:
      ACCESS_KEY_ID: test
      SECRET_ACCESS_KEY: test
      ENDPOINT: localstack:4566
      REGION: us-east-1
      USE_SSL: "false"
      SKIP_SSL_VERIFICATION: "true"
      FORCE_PATH_STYLE: "true"
    ports:
      - "8081:8080"
    depends_on:
      localstack:
        condition: service_healthy

  # AWS LocalStack — mô phỏng S3 + các AWS services khác. Dùng cho dev/test pipeline
  # giống prod AWS. Bucket được tạo tự động bởi script init-bucket.sh khi LocalStack ready.
  # Endpoint từ BE container: http://localstack:4566 (docker DNS).
  # Endpoint từ host: http://localhost:4566.
  localstack:
    image: localstack/localstack:3
    container_name: jira-clone-localstack
    environment:
      SERVICES: s3
      DEBUG: 0
      # Persistence: bucket + data sống qua container restart.
      PERSISTENCE: 1
      DATA_DIR: /var/lib/localstack/data
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      # Init hooks: chạy sau khi LocalStack ready (xem ready.d/* scripts).
      - ./docker/localstack/init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
  localstack_data:
  onlyoffice_data:
  onlyoffice_log:
  onlyoffice_cache:
