services:
  postgres:
    image: postgres:16-alpine
    container_name: jira-clone-postgres
    environment:
      POSTGRES_DB: jira_clone
      POSTGRES_USER: jira_clone
      POSTGRES_PASSWORD: jira_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira_clone"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: jira-clone-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
