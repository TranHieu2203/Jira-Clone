name: dotnet

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Jira-Clone.sln

      - name: Build
        run: dotnet build Jira-Clone.sln -c Release --no-restore

      - name: Test
        run: dotnet test Jira-Clone.sln -c Release --no-build --verbosity minimal
